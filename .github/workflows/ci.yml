name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stable:
    name: Stable (${{ matrix.os }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-07-11 snapshot
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Check locked dependency resolution
        run: cargo check --workspace --all-targets --all-features --locked
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-targets --all-features --locked 2>&1 | tee test-output.log
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo test --workspace --all-targets --all-features --locked 2>&1 |
            Tee-Object -FilePath test-output.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-output-${{ runner.os }}
          path: test-output.log
          # Earlier compile, format, or lint failures legitimately prevent this file.
          if-no-files-found: warn
          retention-days: 14

  msrv:
    name: MSRV (Rust 1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-07-11 snapshot
        with:
          toolchain: 1.85.0
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
        with:
          key: msrv-1.85.0
      - name: Test the locked dependency graph on the MSRV
        run: cargo test --workspace --all-targets --all-features --locked

  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-07-11 snapshot
        with:
          toolchain: stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - name: Verify the release build uses the lockfile
        run: cargo build --workspace --release --locked
      - name: Run the small benchmark fixture once
        env:
          RGIT_BENCH_RUNS: "1"
          RGIT_BENCH_PROFILES: small
          RGIT_BENCH_OUT: benchmark-results.csv
          RGIT_BENCH_HARDWARE_OUT: benchmark-hardware.md
        run: scripts/benchmark.sh
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-smoke-${{ runner.os }}
          path: |
            benchmark-results.csv
            benchmark-hardware.md
          if-no-files-found: error
          retention-days: 14

  supply-chain:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-07-11 snapshot
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Check advisories
        run: cargo audit --deny warnings
      - name: Check licenses, duplicate dependencies, and sources
        uses: EmbarkStudios/cargo-deny-action@9b7d65878c2d28c8e3c16e30bf555c29abe505bd # v2.0.11
        with:
          arguments: --all-features --locked
          command: check
          command-arguments: bans licenses sources
